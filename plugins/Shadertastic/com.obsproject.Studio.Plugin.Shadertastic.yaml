id: com.obsproject.Studio.Plugin.Shadertastic
runtime: com.obsproject.Studio
runtime-version: stable
branch: stable
sdk: org.freedesktop.Sdk//25.08
build-extension: true
separate-locales: false
build-options:
  prefix: /app/plugins/Shadertastic
  strip: true
  build-args: ['--share=network']
  append-path: /app/plugins/Shadertastic/bin
modules:
  - name : patchelf
    buildsystem: simple
    build-commands:
      - install -D patchelf ${FLATPAK_DEST}/bin/patchelf
    sources:
      - type: archive
        url: https://github.com/NixOS/patchelf/releases/download/0.18.0/patchelf-0.18.0-x86_64.tar.gz
        strip-components: 2
        sha256: ce84f2447fb7a8679e58bc54a20dc2b01b37b5802e12c57eece772a6f14bf3f0
    cleanup:
      - /bin/patchelf
      - /bin
  - name: shadertastic
    buildsystem: cmake
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    post-install:
      - install -Dm644 --target-directory=${FLATPAK_DEST}/share/metainfo ../${FLATPAK_ID}.metainfo.xml
    sources:
      - type: git
        url: https://github.com/xurei/shadertastic.git
        tag: 1.0.3
        commit: 2524ba410e5c0347b4613dbf666e9a6a63c4ebc2
        x-checker-data:
          type: git
          is-main-source: true
          tag-pattern: ^([\d.]+)$
      - type: file
        path: com.obsproject.Studio.Plugin.Shadertastic.metainfo.xml